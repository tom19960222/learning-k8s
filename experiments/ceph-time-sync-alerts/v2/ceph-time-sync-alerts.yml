# ceph-time-sync-alerts v2 — 依 E-05a/E-01 已證缺陷重寫（設計依 README §7 四層防禦）。
#
# 設計原則（對應 HYPOTHESES.md）：
#   - 一條 alert = 一個條件（廢除 or on() 混合；H-012 身分/for-reset 問題根治）
#   - 全部 selector 帶 job scope（H-032）；job="ceph-node" 依 E-00 實際 scrape config 調整
#   - spread 用 max(o)-min(o)（H-011：對稱 skew 是 Ceph timecheck 與舊規則的共同盲區）
#   - 絕對 offset 獨立成條件、不 and jitter（H-016）
#   - 快速失聯靠 seconds_since_last_packet（H-023：NTPSynchronized 失聯 ~8.9h 才翻）
#   - 觀測鏈自保：collector_error / per-node missing-series / textfile scrape error（H-004/030/031）
#   - 共模防禦：node_time_seconds vs Prometheus 時間戳（H-015/H-034；唯一跨信任域的路）
#   - timex 快車道 + keep_firing_for 接自癒 transient（H-033；timex offset 是 PLL 殘餘量）
#   - annotation 只寫觀測事實與「可能後果」，不寫 source 撐不起的因果（codex finding 14）；
#     不用 {{ $value }} 模板（promtool 測試可完整斷言 annotations）
#   - 門檻標 [draft-EXX] 者由對應實驗實測後定案；severity 對齊：
#     warning = 前哨（mon 50ms HEALTH_WARN 之前的裕度收窄）、critical = 需要立即行動
groups:
  - name: ceph-time-sync-v2
    rules:
      # ── 車道 A：跨 node 偏差（Ceph mon quorum 最在乎的量）──
      - alert: CephNodeTimeSpreadHigh
        expr: |
          (max(node_ntp_offset_seconds{job="ceph-node"})
           - min(node_ntp_offset_seconds{job="ceph-node"})) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Ceph nodes NTP offsets spread beyond 50ms"
          description: "The gap between the highest and lowest NTP offset across Ceph nodes exceeds 50ms (= mon_clock_drift_allowed). Ceph's own MON_CLOCK_SKEW check runs every 5 minutes, measures peers against the leader only and subtracts latency, so it can miss symmetric skew that this rule catches. Note: offsets are last-poll snapshots; cross-check CephNodeTimeSyncStalled before trusting per-node values."

      - alert: CephNodeTimeSpreadCritical
        expr: |
          (max(node_ntp_offset_seconds{job="ceph-node"})
           - min(node_ntp_offset_seconds{job="ceph-node"})) > 0.15
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ceph nodes NTP offsets spread beyond 150ms"
          description: "Inter-node time spread is 3x mon_clock_drift_allowed. Expect MON_CLOCK_SKEW health warnings; mon quorum stability degrades as skew approaches lease timescales. Act now: check upstream NTP and per-node CephNodeTimeOffsetHigh alerts to find the outlier."

      # ── 車道 B：單 node 絕對偏差（不依賴 jitter 條件；H-016 修正）──
      - alert: CephNodeTimeOffsetWarning
        expr: abs(node_ntp_offset_seconds{job="ceph-node"}) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Node NTP offset above 50ms"
          description: "This node's clock disagrees with its NTP upstream by more than 50ms at the last poll and has not recovered for 3 minutes. timesyncd normally corrects this within one or two poll cycles; sustained offset means correction is failing or drift is faster than correction."

      - alert: CephNodeTimeOffsetHigh
        expr: abs(node_ntp_offset_seconds{job="ceph-node"}) > 0.1   # [draft-E07] threshold/for
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node NTP offset above 100ms"
          description: "This node's clock is off by more than 100ms from its NTP upstream — twice the mon clock-skew allowance. If this node is a mon, expect MON_CLOCK_SKEW within the next timecheck round (up to ~5 minutes behind this alert)."

      # ── 車道 C：快車道 — kernel 正在修正一個大偏差（接住會自癒的 transient step）──
      - alert: CephNodeClockCorrectionInProgress
        expr: abs(node_timex_offset_seconds{job="ceph-node"}) > 0.05   # [draft-E03/E07]
        labels:
          severity: warning
        keep_firing_for: 10m
        annotations:
          summary: "Kernel clock correction larger than 50ms in progress"
          description: "The kernel PLL is actively correcting a clock error larger than 50ms (node_timex_offset_seconds is the remaining correction, not the absolute error). A step this size was injected into or detected on this node recently; timesyncd may repair it within seconds — keep_firing_for holds this alert so the event is visible even after self-heal. A clock step did happen; check what caused it."

      # ── 車道 D：上游失聯（快速訊號；NTPSynchronized 要 ~8.9h 才翻 no）──
      - alert: CephNodeTimeSyncStalled
        expr: node_ntp_seconds_since_last_packet{job="ceph-node"} > 768   # 3×PollIntervalMaxSec(256)
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "No NTP response for over 3 poll intervals"
          description: "timesyncd has not received an NTP packet for more than 768s (3x the production PollIntervalMaxSec of 256s). The clock is now free-running on the local oscillator; offset metrics are frozen at the last poll and no longer reflect reality. NTPSynchronized will stay 'yes' for hours — do not wait for it."

      - alert: CephNodeTimeSyncStalledCritical
        expr: node_ntp_seconds_since_last_packet{job="ceph-node"} > 1800   # [draft-E03]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No NTP response for over 30 minutes"
          description: "Upstream NTP has been unreachable for 30+ minutes. Typical VM oscillator drift (tens of ppm) accumulates several ms of error per minute; multi-node spread alerts may follow. Restore NTP reachability before drift crosses mon_clock_drift_allowed."

      - alert: CephNodeTimeUnsynchronized
        expr: node_ntp_synchronized{job="ceph-node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kernel reports clock unsynchronized (maxerror exceeded 16s)"
          description: "NTPSynchronized=no means the kernel error bound already exceeded 16 seconds — upstream loss started ~9 hours ago, or the daemon never synced since boot. This is the final backstop, not an early signal; earlier alerts (SyncStalled) should have fired first. If they did not, the collection layer itself needs investigation."

      # ── 車道 E：kernel 誤差上界（獨立於 script 的失聯訊號）──
      - alert: CephNodeKernelClockErrorBoundHigh
        expr: node_timex_maxerror_seconds{job="ceph-node"} > 1   # [draft-E03]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kernel clock error bound above 1s"
          description: "node_timex_maxerror_seconds grows at 500us/s whenever the clock is not being disciplined; exceeding 1s means roughly 30+ minutes without successful sync. This kernel-level signal works even if the collection script is broken."

      # ── 車道 F：daemon 掙扎（poll 掉回最小值 = 持續大 offset 或 spike；方向與舊規則相反）──
      - alert: CephNodeTimeSyncStruggling
        expr: node_ntp_poll_interval_seconds{job="ceph-node"} < 64   # [draft-E03]
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "timesyncd poll interval stuck at minimum"
          description: "timesyncd shortens its poll interval when offsets are large or unstable and lengthens it (up to PollIntervalMaxSec=256) when sync is good. A poll interval pinned below 64s for 15+ minutes means the daemon is repeatedly measuring bad offsets — upstream quality or local clock stability problem."

      # ── 車道 G：共模漂移（唯一跨信任域的觀測路；Prometheus host 時鐘須另行監控）──
      - alert: CephNodeClockVsPrometheusDrift
        expr: |
          abs(node_time_seconds{job="ceph-node"}
              - timestamp(node_time_seconds{job="ceph-node"})) > 1   # [draft-E06] 雜訊水位
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node clock differs from Prometheus server clock by over 1s"
          description: "Cross-trust-domain check: the node's wall clock disagrees with the Prometheus server's scrape timestamps. This is the only signal that catches the whole cluster following a wrong upstream (all node-local signals look healthy in that case). Includes scrape delay noise; threshold calibrated against measured noise floor. Verify the Prometheus host's own clock before trusting the sign."

      - alert: CephNodeClockVsPrometheusDriftCritical
        expr: |
          abs(node_time_seconds{job="ceph-node"}
              - timestamp(node_time_seconds{job="ceph-node"})) > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node clock differs from Prometheus server clock by over 10s"
          description: "A 10s+ wall-clock disagreement across trust domains cannot be scrape noise. Either this node (or the whole cluster, if all nodes alert together) is following wrong time, or the Prometheus host is. S3/RGW request signing tolerates +/-15min; cephx and mon health degrade far earlier. Identify which side is wrong against an external reference before correcting."

      # ── 車道 H：觀測鏈自保（H-004/H-030/H-031 — 監控自己死了必須有人叫）──
      - alert: CephNodeTimeCollectorError
        expr: node_time_sync_collector_error{job="ceph-node"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Time-sync collector failing on this node"
          description: "collect_time_sync.sh could not collect or parse at least one core field for 10+ minutes (timedatectl unavailable, chrony took over, or output format changed). Metrics for the failed fields are absent — clock problems on this node are currently invisible to the offset-based alerts."

      - alert: CephNodeTimeMetricsMissing
        expr: |
          up{job="ceph-node"} == 1
          unless on(instance) node_time_sync_collector_error{job="ceph-node"}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Time-sync metrics absent while node is up"
          description: "node_exporter answers scrapes but the time-sync textfile metrics are gone: the collector timer is dead, the textfile was rejected as malformed, or the textfile directory changed. Per-node detection — this fires for exactly the node whose collection died. All offset-based alerts are blind for this node until fixed."

      - alert: CephNodeTextfileScrapeError
        expr: node_textfile_scrape_error{job="ceph-node"} == 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "node_exporter rejected a textfile on this node"
          description: "Some .prom file failed to parse — node_exporter drops the whole file and reports only this target-wide flag (no file label). If CephNodeTimeMetricsMissing fires for the same node, the time-sync file is the likely culprit; otherwise another collector's file broke. Attribution requires checking the textfile directory on the node."
