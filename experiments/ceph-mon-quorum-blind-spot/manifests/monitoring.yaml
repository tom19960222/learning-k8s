apiVersion: v1
kind: Namespace
metadata:
  name: qmon
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-config
  namespace: qmon
data:
  blackbox.yml: |
    modules:
      tcp_connect:
        prober: tcp
        timeout: 3s
        tcp:
          preferred_ip_protocol: ip4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox
  namespace: qmon
spec:
  replicas: 1
  selector: { matchLabels: { app: blackbox } }
  template:
    metadata: { labels: { app: blackbox } }
    spec:
      containers:
      - name: blackbox
        image: prom/blackbox-exporter:v0.25.0
        args: ["--config.file=/etc/blackbox/blackbox.yml"]
        ports: [{ containerPort: 9115 }]
        volumeMounts: [{ name: cfg, mountPath: /etc/blackbox }]
      volumes:
      - name: cfg
        configMap: { name: blackbox-config }
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox
  namespace: qmon
spec:
  selector: { app: blackbox }
  ports: [{ port: 9115, targetPort: 9115 }]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: qmon
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      # A1/A2/A4: the single mgr prometheus module — the source that freezes.
      - job_name: ceph
        static_configs:
          - targets: ['192.168.18.153:9283']
            labels: { instance: 'ceph-mgr' }
      # A3: blackbox TCP probe of each mon v2 msgr port (independent of mgr).
      - job_name: mon-tcp
        metrics_path: /probe
        params: { module: [tcp_connect] }
        static_configs:
          - targets:
            - '192.168.18.166:3300'   # mon-01 (active mgr host, stays up)
            - '192.168.18.167:3300'   # mon-02 (stopped in scenario)
            - '192.168.18.164:3300'   # mon-03 (stopped in scenario)
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: mon_addr
          - target_label: __address__
            replacement: blackbox.qmon.svc:9115
      # A5: node_exporter systemd collector on each mon host (added at runtime if used).
      - job_name: mon-node
        static_configs:
          - targets: []
  rules.yml: |
    groups:
      - name: quorum-detection-candidates
        rules:
          # A1 — existing rule (expected: BLIND, stays none on 2/3 down)
          - alert: CephMonQuorumLost
            expr: (count(ceph_mon_quorum_status == 1) or vector(0)) < 2
            for: 1m
            labels: { severity: critical, cand: A1_mgr_existing }
            annotations: { summary: "existing mgr-based quorum rule" }
          # A3 — blackbox mon-port majority (expected: FIRES on 2/3 down)
          - alert: CephMonQuorumLostBlackbox
            expr: (count(probe_success{job="mon-tcp"} == 1) or vector(0)) < 2
            for: 30s
            labels: { severity: critical, cand: A3_blackbox }
            annotations: { summary: "mon TCP-port majority lost (blackbox)" }
          # A4 — mgr scrape up (expected: BLIND, up stays 1 while mgr serves stale)
          - alert: CephExporterAllDown
            expr: (count(up{job="ceph"} == 1) or vector(0)) == 0
            for: 30s
            labels: { severity: critical, cand: A4_up_only }
            annotations: { summary: "all ceph mgr scrape targets down" }
          # A3-dyn — dynamic majority variant off blackbox probe count
          - alert: CephMonQuorumLostBlackboxDynamic
            expr: (count(probe_success{job="mon-tcp"} == 1) or vector(0)) < (floor(count(probe_success{job="mon-tcp"}) / 2) + 1)
            for: 30s
            labels: { severity: critical, cand: A3_blackbox_dyn }
            annotations: { summary: "mon TCP majority lost (dynamic)" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: qmon
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.53.0
        args:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
          - "--storage.tsdb.retention.time=6h"
          - "--web.enable-lifecycle"
        ports: [{ containerPort: 9090 }]
        volumeMounts:
          - { name: cfg, mountPath: /etc/prometheus/prometheus.yml, subPath: prometheus.yml }
          - { name: rules, mountPath: /etc/prometheus/rules/rules.yml, subPath: rules.yml }
      volumes:
        - name: cfg
          configMap: { name: prometheus-config, items: [{ key: prometheus.yml, path: prometheus.yml }] }
        - name: rules
          configMap: { name: prometheus-config, items: [{ key: rules.yml, path: rules.yml }] }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: qmon
spec:
  type: NodePort
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090, nodePort: 30090 }]
