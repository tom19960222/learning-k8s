# Tier A — CephDataDamage：PG_DAMAGED / OSD_SCRUB_ERRORS 1m critical。
rule_files:
  - ../../rules/ceph-production-coverage.yml
evaluation_interval: 1m
tests:
  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="PG_DAMAGED", severity="HEALTH_ERR"}'
        values: '1x5'
      - series: 'ceph_health_detail{name="OSD_SCRUB_ERRORS", severity="HEALTH_ERR"}'
        values: '1x5'
    alert_rule_test:
      - eval_time: 0m
        alertname: CephDataDamage
        exp_alerts: []
      - eval_time: 1m
        alertname: CephDataDamage
        exp_alerts:
          - exp_labels: {name: PG_DAMAGED, severity: critical, source: ceph_coverage}
            exp_annotations: {summary: "Ceph data damage detected: PG_DAMAGED — identify bad replica before repair"}
          - exp_labels: {name: OSD_SCRUB_ERRORS, severity: critical, source: ceph_coverage}
            exp_annotations: {summary: "Ceph data damage detected: OSD_SCRUB_ERRORS — identify bad replica before repair"}

  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="PG_DAMAGED", severity="HEALTH_ERR"}'
        values: '0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: CephDataDamage
        exp_alerts: []
