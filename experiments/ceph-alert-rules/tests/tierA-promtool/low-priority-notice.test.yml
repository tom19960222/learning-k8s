# Tier A — CephLowPriorityNotice：7 個低優先 name，30m，severity info（slack-only）。spec §4.7
# 強化（analyzer I3）：跨規則一致性對 PG_DEGRADED 與 OSDMAP_FLAGS 雙驗——
# 兩者都該 fire LowPriorityNotice(info) 但 NOT fire CephClientRisk(critical)。
# v2：regex 加入 POOL_APP_NOT_ENABLED、POOL_NEARFULL（兩者都只是提醒，非 client 風險）。
rule_files:
  - ../../rules/ceph-stability-first.yml
evaluation_interval: 1m
tests:
  # 7 個 name 同時 active：for 邊界 29m 不 fire、30m fire 7 個實例（severity 被蓋成 info）
  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="HOST_IN_MAINTENANCE", severity="HEALTH_WARN"}'
        values: '1x35'
      - series: 'ceph_health_detail{name="OBJECT_MISPLACED", severity="HEALTH_WARN"}'
        values: '1x35'
      - series: 'ceph_health_detail{name="OSDMAP_FLAGS", severity="HEALTH_WARN"}'
        values: '1x35'
      - series: 'ceph_health_detail{name="PG_DEGRADED", severity="HEALTH_WARN"}'
        values: '1x35'
      - series: 'ceph_health_detail{name="PG_SLOW_SNAP_TRIMMING", severity="HEALTH_WARN"}'
        values: '1x35'
      - series: 'ceph_health_detail{name="POOL_APP_NOT_ENABLED", severity="HEALTH_WARN"}'
        values: '1x35'
      - series: 'ceph_health_detail{name="POOL_NEARFULL", severity="HEALTH_WARN"}'
        values: '1x35'
    alert_rule_test:
      - eval_time: 29m
        alertname: CephLowPriorityNotice
        exp_alerts: []
      - eval_time: 30m
        alertname: CephLowPriorityNotice
        exp_alerts:
          - exp_labels: {name: HOST_IN_MAINTENANCE, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: HOST_IN_MAINTENANCE"}
          - exp_labels: {name: OBJECT_MISPLACED, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: OBJECT_MISPLACED"}
          - exp_labels: {name: OSDMAP_FLAGS, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: OSDMAP_FLAGS"}
          - exp_labels: {name: PG_DEGRADED, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: PG_DEGRADED"}
          - exp_labels: {name: PG_SLOW_SNAP_TRIMMING, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: PG_SLOW_SNAP_TRIMMING"}
          - exp_labels: {name: POOL_APP_NOT_ENABLED, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: POOL_APP_NOT_ENABLED"}
          - exp_labels: {name: POOL_NEARFULL, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: POOL_NEARFULL"}

  # 負向：PG_AVAILABILITY 不在低優先清單 → LowPriorityNotice 不 fire
  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="PG_AVAILABILITY", severity="HEALTH_WARN"}'
        values: '1x35'
    alert_rule_test:
      - eval_time: 30m
        alertname: CephLowPriorityNotice
        exp_alerts: []

  # 跨規則一致性 PG_DEGRADED：LowPriority fire(info)、ClientRisk 全程不 fire
  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="PG_DEGRADED", severity="HEALTH_WARN"}'
        values: '1x35'
    alert_rule_test:
      - eval_time: 6m
        alertname: CephClientRisk
        exp_alerts: []
      - eval_time: 30m
        alertname: CephClientRisk
        exp_alerts: []
      - eval_time: 30m
        alertname: CephLowPriorityNotice
        exp_alerts:
          - exp_labels: {name: PG_DEGRADED, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: PG_DEGRADED"}

  # 跨規則一致性 OSDMAP_FLAGS（cluster-wide noout）：LowPriority fire、ClientRisk 不 fire
  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="OSDMAP_FLAGS", severity="HEALTH_WARN"}'
        values: '1x35'
    alert_rule_test:
      - eval_time: 6m
        alertname: CephClientRisk
        exp_alerts: []
      - eval_time: 30m
        alertname: CephLowPriorityNotice
        exp_alerts:
          - exp_labels: {name: OSDMAP_FLAGS, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: OSDMAP_FLAGS"}

  # 跨規則一致性 OSD_FLAGS —— 真機 Tier D 發現：ceph v19.2.3 的 `maintenance enter` 對 host subtree
  # 設 noout 升的是 OSD_FLAGS（不是頁面早期假設的 OSDMAP_FLAGS）。在真叢集上觀測到舊版排除清單沒列
  # OSD_FLAGS → CephClientRisk{name=OSD_FLAGS} 在例行維護時 firing（pages oncall）。修正後此 case 鎖住：
  # OSD_FLAGS 必須只進 LowPriority(Slack)、不得讓 CephClientRisk fire。
  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="OSD_FLAGS", severity="HEALTH_WARN"}'
        values: '1x35'
    alert_rule_test:
      - eval_time: 6m
        alertname: CephClientRisk
        exp_alerts: []
      - eval_time: 30m
        alertname: CephLowPriorityNotice
        exp_alerts:
          - exp_labels: {name: OSD_FLAGS, severity: info, source: ceph_stability}
            exp_annotations: {summary: "Ceph low-priority notice: OSD_FLAGS"}
