# Tier A — CephMonDiskCritical：MON_DISK_CRIT，1m critical（mon store 磁碟空間見底，quorum 隨時可能出事）。
rule_files:
  - ../../rules/ceph-production-coverage.yml
evaluation_interval: 1m
tests:
  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="MON_DISK_CRIT", severity="HEALTH_ERR"}'
        values: '1x10'
    alert_rule_test:
      - eval_time: 0m
        alertname: CephMonDiskCritical
        exp_alerts: []
      - eval_time: 1m
        alertname: CephMonDiskCritical
        exp_alerts:
          - exp_labels: {name: MON_DISK_CRIT, severity: critical, source: ceph_coverage}
            exp_annotations: {summary: "Ceph MON data disk space critically low"}

  - interval: 1m
    input_series:
      - series: 'ceph_health_detail{name="MON_DISK_CRIT", severity="HEALTH_ERR"}'
        values: '0x10'
    alert_rule_test:
      - eval_time: 3m
        alertname: CephMonDiskCritical
        exp_alerts: []
