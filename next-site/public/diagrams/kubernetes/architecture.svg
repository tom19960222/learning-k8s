  <text x="240.0" y="146" text-anchor="middle" class="node-title" fill="#3b82f6">kubectl / client-go</text>
  <text x="240.0" y="166" text-anchor="middle" class="node-sub">HTTPS REST + kubeconfig</text>
  <text x="240.0" y="180" text-anchor="middle" class="node-sub">watch / list / patch</text>
  <rect x="540" y="120" width="240" height="80" rx="6" ry="6" fill="#0b1220" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="660.0" y="146" text-anchor="middle" class="node-title" fill="#3b82f6">Operator / Controller</text>
  <text x="660.0" y="166" text-anchor="middle" class="node-sub">External controllers,</text>
  <text x="660.0" y="180" text-anchor="middle" class="node-sub">CI/CD, Helm, GitOps</text>
  <rect x="960" y="120" width="240" height="80" rx="6" ry="6" fill="#0b1220" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1080.0" y="146" text-anchor="middle" class="node-title" fill="#3b82f6">Cloud Provider API</text>
  <text x="1080.0" y="166" text-anchor="middle" class="node-sub">LB / Volume / Node</text>
  <text x="1080.0" y="180" text-anchor="middle" class="node-sub">(via cloud-controller-manager)</text>
  <rect x="120" y="305" width="240" height="130" rx="6" ry="6" fill="#0b1220" stroke="#f97316" stroke-width="1.5"/>
  <text x="240.0" y="331" text-anchor="middle" class="node-title" fill="#f97316">kube-scheduler</text>
  <text x="240.0" y="351" text-anchor="middle" class="node-sub">watch unscheduled Pods</text>
  <text x="240.0" y="365" text-anchor="middle" class="node-sub">predicate + score</text>
  <text x="240.0" y="379" text-anchor="middle" class="node-sub">Bind &#8594; spec.nodeName</text>
  <rect x="420" y="295" width="280" height="150" rx="6" ry="6" fill="#1c1917" stroke="#f97316" stroke-width="1.5"/>
  <text x="560.0" y="321" text-anchor="middle" class="node-title" fill="#f97316">kube-apiserver</text>
  <text x="560.0" y="341" text-anchor="middle" class="node-sub">HTTPS REST front door</text>
  <text x="560.0" y="355" text-anchor="middle" class="node-sub">admission &#8594; validation &#8594; etcd</text>
  <text x="560.0" y="369" text-anchor="middle" class="node-sub">ONLY reader/writer of etcd</text>
  <rect x="760" y="305" width="280" height="130" rx="6" ry="6" fill="#0b1220" stroke="#f97316" stroke-width="1.5"/>
  <text x="900.0" y="331" text-anchor="middle" class="node-title" fill="#f97316">kube-controller-manager</text>
  <text x="900.0" y="351" text-anchor="middle" class="node-sub">~30 controllers as goroutines</text>
  <text x="900.0" y="365" text-anchor="middle" class="node-sub">Deployment / RS / Endpoint</text>
  <text x="900.0" y="379" text-anchor="middle" class="node-sub">reconcile loop</text>
