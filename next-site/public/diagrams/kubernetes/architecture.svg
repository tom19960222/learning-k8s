  <text x="1180.0" y="365" text-anchor="middle" class="node-sub">cluster source</text>
  <text x="1180.0" y="379" text-anchor="middle" class="node-sub">of truth</text>
  <rect x="120" y="550" width="220" height="130" rx="6" ry="6" fill="#0b1220" stroke="#10b981" stroke-width="1.5"/>
