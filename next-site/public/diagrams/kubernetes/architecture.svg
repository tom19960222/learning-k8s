  <text x="1215.0" y="610" text-anchor="middle" class="node-sub">kernel +</text>
  <text x="1215.0" y="624" text-anchor="middle" class="node-sub">cgroup</text>
  <rect x="180" y="780" width="220" height="90" rx="6" ry="6" fill="#0b1220" stroke="#a855f7" stroke-width="1.5"/>
  <text x="290.0" y="806" text-anchor="middle" class="node-title" fill="#a855f7">Pod (app)</text>
  <text x="290.0" y="826" text-anchor="middle" class="node-sub">userspace container</text>
  <text x="290.0" y="840" text-anchor="middle" class="node-sub">with veth pair to CNI</text>
  <rect x="460" y="780" width="220" height="90" rx="6" ry="6" fill="#0b1220" stroke="#a855f7" stroke-width="1.5"/>
  <text x="570.0" y="806" text-anchor="middle" class="node-title" fill="#a855f7">Pod (system)</text>
  <text x="570.0" y="826" text-anchor="middle" class="node-sub">DaemonSet / static Pod</text>
  <text x="570.0" y="840" text-anchor="middle" class="node-sub">apiserver/etcd live here</text>
  <rect x="740" y="780" width="220" height="90" rx="6" ry="6" fill="#0b1220" stroke="#a855f7" stroke-width="1.5"/>
  <text x="850.0" y="806" text-anchor="middle" class="node-title" fill="#a855f7">Service ClusterIP</text>
  <text x="850.0" y="826" text-anchor="middle" class="node-sub">VIP routed by kube-proxy</text>
  <text x="850.0" y="840" text-anchor="middle" class="node-sub">rules to backend Pods</text>
  <rect x="1020" y="780" width="220" height="90" rx="6" ry="6" fill="#0b1220" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1130.0" y="806" text-anchor="middle" class="node-title" fill="#a855f7">PV / CSI volume</text>
