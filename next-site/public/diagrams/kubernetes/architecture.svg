  <text x="1010.0" y="596" text-anchor="middle" class="node-sub">watch Service +</text>
  <text x="1010.0" y="610" text-anchor="middle" class="node-sub">EndpointSlice</text>
  <text x="1010.0" y="624" text-anchor="middle" class="node-sub">iptables / IPVS / nftables</text>
  <rect x="1160" y="550" width="110" height="130" rx="6" ry="6" fill="#0a0a0a" stroke="#475569" stroke-width="1.5"/>
