  <rect width="1320" height="900" fill="url(#bg-grad)"/>
  <text x="660" y="44" text-anchor="middle" class="title">Kubernetes Architecture: control plane &#8594; worker node</text>
  <rect x="40" y="80" width="1240" height="140" rx="8" ry="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.95"/>
  <text x="56" y="102" class="layer-label" fill="#3b82f6">User / Client</text>
  <rect x="40" y="260" width="1240" height="200" rx="8" ry="8" fill="#0f172a" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.95"/>
  <text x="56" y="282" class="layer-label" fill="#f97316">Control Plane (static Pods in kube-system)</text>
  <rect x="40" y="510" width="1240" height="190" rx="8" ry="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.95"/>
  <text x="56" y="532" class="layer-label" fill="#10b981">Worker Node x N  (kubelet runs on every node, including control plane)</text>
  <rect x="40" y="750" width="1240" height="130" rx="8" ry="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.95"/>
  <text x="56" y="772" class="layer-label" fill="#a855f7">Workload Pods (data plane)</text>
