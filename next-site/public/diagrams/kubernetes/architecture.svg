  <text x="750.0" y="610" text-anchor="middle" class="node-sub">(Cilium / Multus /</text>
  <text x="750.0" y="624" text-anchor="middle" class="node-sub">calico / flannel)</text>
  <rect x="900" y="550" width="220" height="130" rx="6" ry="6" fill="#0b1220" stroke="#10b981" stroke-width="1.5"/>
