  <text x="1180" y="180" class="week-sub">VirtualMachine / virt-handler / live migration</text>
  <text x="1180" y="196" class="week-sub">D22 &#8594; D30 (整合 demo)</text>

  <rect x="1180" y="218" width="320" height="50" rx="6" ry="6" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="1200" y="238" class="day-id" fill="#a855f7">D22</text>
  <text x="1200" y="256" class="day-cap">KubeVirt 安裝 + 第一台 VM</text>

  <rect x="1180" y="274" width="320" height="46" rx="6" ry="6" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
