<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'PingFang TC', 'Microsoft JhengHei', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
    .title { font-size: 26px; font-weight: 700; fill: #f1f5f9; }
    .subtitle { font-size: 15px; fill: #94a3b8; }
    .week-label { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
    .week-sub { font-size: 12px; fill: #cbd5e1; }
    .day-id { font-size: 14px; font-weight: 700; }
    .day-cap { font-size: 11px; fill: #cbd5e1; }
    .milestone-title { font-size: 13px; font-weight: 700; fill: #f1f5f9; }
    .milestone-sub { font-size: 11px; fill: #cbd5e1; }
    .legend-text { font-size: 12px; fill: #cbd5e1; }
    .axis-label { font-size: 11px; fill: #64748b; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#10b981"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f97316"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#a855f7"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#eab308"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#06b6d4"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg-grad)"/>

  <!-- Header -->
  <text x="800" y="46" text-anchor="middle" class="title">30 天 hands-on 路徑圖</text>
  <text x="800" y="72" text-anchor="middle" class="subtitle">從 k8s 內部 &#8594; CNI &#8594; 儲存 &#8594; VM</text>

  <!-- Timeline axis -->
