  <text x="840" y="488" class="day-cap">CephFS RWX 共享 volume</text>

  <rect x="820" y="506" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#f97316" stroke-width="1.2"/>
  <text x="840" y="526" class="day-id" fill="#f97316">D20</text>
  <text x="840" y="544" class="day-cap">Rook operator reconcile loop</text>

  <rect x="820" y="562" width="300" height="62" rx="6" ry="6" fill="#0f172a" stroke="#eab308" stroke-width="2"/>
  <text x="840" y="586" class="day-id" fill="#eab308">D21 ★</text>
  <text x="840" y="606" class="day-cap" fill="#fde047">RGW + boto3 (S3)</text>
  <text x="840" y="620" class="day-cap" fill="#fde047">milestone: 儲存堆疊就位</text>

  <!-- ===== Week 4+ column (purple) ===== -->
  <rect x="1160" y="130" width="360" height="640" rx="10" ry="10" fill="#0b1220" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.95"/>
