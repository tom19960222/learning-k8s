  <text x="80" y="102" class="axis-label">START</text>
  <text x="1520" y="102" text-anchor="end" class="axis-label">DAY 30 &#8594; 整合 demo</text>

  <!-- ===== Week 1 column (blue) ===== -->
  <rect x="80" y="130" width="340" height="640" rx="10" ry="10" fill="#0b1220" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.95"/>
  <text x="100" y="160" class="week-label" fill="#3b82f6">Week 1 &#8729; ⚙️ Kubernetes 內部</text>
  <text x="100" y="180" class="week-sub">control plane / kubelet / kube-proxy</text>
  <text x="100" y="196" class="week-sub">D1 &#8594; D7 (operator 收關)</text>

  <!-- Week 1 day cells -->
  <rect x="100" y="218" width="300" height="58" rx="6" ry="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="120" y="240" class="day-id" fill="#3b82f6">D01</text>
  <text x="120" y="260" class="day-cap">巡禮 control plane 4 元件</text>

  <rect x="100" y="282" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="120" y="302" class="day-id" fill="#3b82f6">D02</text>
  <text x="120" y="320" class="day-cap">etcd raw key 與 watch</text>

  <rect x="100" y="338" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="120" y="358" class="day-id" fill="#3b82f6">D03</text>
  <text x="120" y="376" class="day-cap">apiserver handler chain</text>

  <rect x="100" y="394" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="120" y="414" class="day-id" fill="#3b82f6">D04</text>
  <text x="120" y="432" class="day-cap">controller-manager reconcile</text>

  <rect x="100" y="450" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="120" y="470" class="day-id" fill="#3b82f6">D05</text>
  <text x="120" y="488" class="day-cap">kubelet &#8594; CRI &#8594; container</text>

  <rect x="100" y="506" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="120" y="526" class="day-id" fill="#3b82f6">D06</text>
  <text x="120" y="544" class="day-cap">kube-proxy iptables/IPVS</text>

  <rect x="100" y="562" width="300" height="62" rx="6" ry="6" fill="#0f172a" stroke="#eab308" stroke-width="2"/>
  <text x="120" y="586" class="day-id" fill="#eab308">D07 ★</text>
  <text x="120" y="606" class="day-cap" fill="#fde047">自寫 ConfigMap watcher operator</text>
  <text x="120" y="620" class="day-cap" fill="#fde047">milestone: k8s 內部走完</text>

  <!-- ===== Week 2 column (green) ===== -->
  <rect x="440" y="130" width="340" height="640" rx="10" ry="10" fill="#0b1220" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.95"/>
  <text x="460" y="160" class="week-label" fill="#10b981">Week 2 &#8729; 🌐 cilium + multus</text>
  <text x="460" y="180" class="week-sub">eBPF datapath / 多平面網路</text>
  <text x="460" y="196" class="week-sub">D8 &#8594; D14 (delegate flow)</text>

  <rect x="460" y="218" width="300" height="58" rx="6" ry="6" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <text x="480" y="240" class="day-id" fill="#10b981">D08</text>
  <text x="480" y="260" class="day-cap">換掉 kube-proxy，cilium 接手</text>

  <rect x="460" y="282" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <text x="480" y="302" class="day-id" fill="#10b981">D09</text>
  <text x="480" y="320" class="day-cap">cilium monitor 看 eBPF trace</text>

  <rect x="460" y="338" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <text x="480" y="358" class="day-id" fill="#10b981">D10</text>
  <text x="480" y="376" class="day-cap">CiliumNetworkPolicy L3/L4/L7</text>

  <rect x="460" y="394" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <text x="480" y="414" class="day-id" fill="#10b981">D11</text>
  <text x="480" y="432" class="day-cap">Hubble 觀測 flow</text>

  <rect x="460" y="450" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <text x="480" y="470" class="day-id" fill="#10b981">D12</text>
  <text x="480" y="488" class="day-cap">multus 安裝 + CRD</text>

  <rect x="460" y="506" width="300" height="50" rx="6" ry="6" fill="#0f172a" stroke="#10b981" stroke-width="1.2"/>
  <text x="480" y="526" class="day-id" fill="#10b981">D13</text>
  <text x="480" y="544" class="day-cap">多網路 Pod (eth0 + net1)</text>

  <rect x="460" y="562" width="300" height="62" rx="6" ry="6" fill="#0f172a" stroke="#eab308" stroke-width="2"/>
