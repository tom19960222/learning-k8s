  <text x="1200" y="414" class="day-cap">VM + multus secondary NIC</text>

  <rect x="1180" y="430" width="320" height="46" rx="6" ry="6" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="1200" y="450" class="day-id" fill="#a855f7">D26</text>
  <text x="1200" y="466" class="day-cap">VM 用 ceph-csi RBD root disk</text>

  <rect x="1180" y="482" width="320" height="46" rx="6" ry="6" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="1200" y="502" class="day-id" fill="#a855f7">D27</text>
  <text x="1200" y="518" class="day-cap">live migration (memory dirty page)</text>

  <rect x="1180" y="534" width="320" height="46" rx="6" ry="6" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="1200" y="554" class="day-id" fill="#a855f7">D28</text>
  <text x="1200" y="570" class="day-cap">VM Service + 連線測試</text>

  <rect x="1180" y="586" width="320" height="46" rx="6" ry="6" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="1200" y="606" class="day-id" fill="#a855f7">D29</text>
  <text x="1200" y="622" class="day-cap">監控 / metrics / 故障演練</text>

  <rect x="1180" y="638" width="320" height="62" rx="6" ry="6" fill="#0f172a" stroke="#eab308" stroke-width="2"/>
  <text x="1200" y="662" class="day-id" fill="#eab308">D30 ★</text>
  <text x="1200" y="682" class="day-cap" fill="#fde047">平台整合 demo + 30 天回顧</text>
  <text x="1200" y="696" class="day-cap" fill="#fde047">milestone: 跑出可用平台</text>

  <!-- Week-to-week flow arrows (timeline) -->
  <line x1="400" y1="400" x2="442" y2="400" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="760" y1="400" x2="802" y2="400" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="1120" y1="400" x2="1162" y2="400" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Milestone callouts (bottom strip) -->
  <rect x="80" y="790" width="1440" height="90" rx="8" ry="8" fill="#0b1220" stroke="#eab308" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.95"/>
  <text x="100" y="814" class="milestone-title" fill="#eab308">★ 4 個 milestone</text>

  <text x="100" y="838" class="milestone-sub"><tspan fill="#3b82f6" font-weight="700">D7</tspan> &#8729; k8s 內部走完：自寫 operator 才算閉環</text>
  <text x="100" y="858" class="milestone-sub"><tspan fill="#10b981" font-weight="700">D14</tspan> &#8729; 多平面網路打通：cilium eBPF + multus 第二張 NIC</text>
  <text x="800" y="838" class="milestone-sub"><tspan fill="#f97316" font-weight="700">D21</tspan> &#8729; 儲存堆疊就位：RBD / CephFS / RGW 三種模式都跑過</text>
  <text x="800" y="858" class="milestone-sub"><tspan fill="#a855f7" font-weight="700">D30</tspan> &#8729; 整合 demo：VM + Service + secondary NIC + ceph PV + live migration</text>

  <!-- Legend (bottom-left, inside header band area) -->
  <g transform="translate(80, 736)">
    <rect x="0" y="0" width="1440" height="40" rx="6" ry="6" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <rect x="16" y="12" width="14" height="14" fill="#3b82f6" rx="2"/>
    <text x="38" y="24" class="legend-text">Week 1 — k8s 內部 (D1-7)</text>
    <rect x="280" y="12" width="14" height="14" fill="#10b981" rx="2"/>
    <text x="302" y="24" class="legend-text">Week 2 — cilium + multus (D8-14)</text>
    <rect x="600" y="12" width="14" height="14" fill="#f97316" rx="2"/>
    <text x="622" y="24" class="legend-text">Week 3 — ceph + rook (D15-21)</text>
    <rect x="900" y="12" width="14" height="14" fill="#a855f7" rx="2"/>
    <text x="922" y="24" class="legend-text">Week 4+ — kubevirt 整合 (D22-30)</text>
    <rect x="1220" y="12" width="14" height="14" fill="#eab308" rx="2"/>
    <text x="1242" y="24" class="legend-text">★ milestone day</text>
  </g>
