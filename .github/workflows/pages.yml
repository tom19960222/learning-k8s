name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: next-site

      - name: Build static site
        run: npm run build
        working-directory: next-site
        env:
          NEXT_PUBLIC_BASE_PATH: /learning-k8s

      - name: Disable Jekyll processing
        run: touch out/.nojekyll
        working-directory: next-site

      - name: Publish to gh-pages
        run: |
          cd next-site/out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit --allow-empty -m "Deploy ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
